<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Sign In — UNIMED Global</title>
  
  <!-- Preconnect Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  <script src="theme.js"></script>

  <style>
    /* Fullscreen Standalone Page Reset (No Navbar, No Footer, No Extras) */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Outfit', 'Inter Tight', sans-serif;
      box-sizing: border-box;
    }

    .admin-standalone-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 35% 50%, #2e281e 0%, #151518 70%);
      transition: background 0.7s cubic-bezier(0.25, 0.8, 0.25, 1);
      overflow: hidden;
    }

    /* Light Theme (Color and White mode) */
    html.light-theme .admin-standalone-wrapper {
      background: radial-gradient(circle at 35% 50%, #ffffff 0%, #e2e8f0 75%);
    }

    /* Warm Ambient Lamp Glow Layer */
    .lamp-glow-overlay {
      position: absolute;
      top: 50%;
      left: 38%;
      transform: translate(-50%, -55%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(254, 240, 138, 0.28) 0%, rgba(245, 158, 11, 0.08) 45%, rgba(0, 0, 0, 0) 70%);
      pointer-events: none;
      z-index: 1;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    html.light-theme .lamp-glow-overlay {
      background: radial-gradient(circle, rgba(253, 224, 71, 0.35) 0%, rgba(59, 130, 246, 0.08) 50%, rgba(255, 255, 255, 0) 75%);
    }

    /* Central Layout Container */
    .lamp-login-stage {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 60px;
      max-width: 900px;
      width: 90%;
    }

    /* ── LEFT LAMP FIXTURE ─────────────────────────────────────────── */
    .lamp-fixture-wrap {
      position: relative;
      width: 260px;
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .lamp-svg {
      width: 220px;
      height: 280px;
      filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5));
      transition: filter 0.5s ease;
    }

    html.light-theme .lamp-svg {
      filter: drop-shadow(0 15px 30px rgba(0,0,0,0.12));
    }

    /* Lamp Glow Effect inside SVG */
    .lamp-shade-glow {
      fill: #ffffff;
      filter: drop-shadow(0 0 35px rgba(255, 255, 255, 0.95)) drop-shadow(0 0 60px rgba(254, 240, 138, 0.8));
      transition: fill 0.4s, filter 0.4s;
    }

    html.light-theme .lamp-shade-glow {
      fill: #ffffff;
      filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.7)) drop-shadow(0 0 45px rgba(251, 191, 36, 0.5));
    }

    /* Interactive Pull Chain */
    .pull-chain-group {
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .pull-chain-group:hover .pull-knob {
      transform: scale(1.3);
      filter: drop-shadow(0 0 10px #fbbf24);
    }

    /* Cord Pull Animation */
    .pulling {
      animation: cordPullBounce 0.4s ease-in-out;
    }

    @keyframes cordPullBounce {
      0% { transform: translateY(0); }
      40% { transform: translateY(14px); }
      70% { transform: translateY(-3px); }
      100% { transform: translateY(0); }
    }

    /* ── RIGHT GLASSMORPHISM LOGIN FORM ────────────────────────────── */
    .glass-login-card {
      width: 340px;
      background: rgba(30, 30, 35, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 42px 36px 36px 36px;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
      box-sizing: border-box;
      transition: background 0.6s, border-color 0.6s, box-shadow 0.6s;
    }

    html.light-theme .glass-login-card {
      background: rgba(255, 255, 255, 0.82);
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.05);
    }

    .card-title {
      font-size: 1.85rem;
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      margin: 0 0 28px 0;
      letter-spacing: -0.02em;
      transition: color 0.5s;
    }

    html.light-theme .card-title {
      color: #0f172a;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 30px;
    }

    .field-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-label {
      font-size: 0.82rem;
      font-weight: 500;
      color: #a1a1aa;
      transition: color 0.5s;
    }

    html.light-theme .field-label {
      color: #64748b;
    }

    .field-input {
      width: 100%;
      font-family: inherit;
      font-size: 0.92rem;
      color: #ffffff;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 14px 16px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.25s, background 0.25s, color 0.25s;
    }

    html.light-theme .field-input {
      background: #f8fafc;
      border-color: #cbd5e1;
      color: #0f172a;
    }

    .field-input::placeholder {
      color: #52525b;
    }

    html.light-theme .field-input::placeholder {
      color: #94a3b8;
    }

    .field-input:focus {
      border-color: #e5a93b;
      background: rgba(0, 0, 0, 0.35);
    }

    html.light-theme .field-input:focus {
      border-color: #e5a93b;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(229, 169, 59, 0.2);
    }

    /* Golden Pill Button */
    .gold-sign-in-btn {
      width: 100%;
      font-family: inherit;
      font-size: 0.98rem;
      font-weight: 700;
      color: #1a150b;
      background: linear-gradient(180deg, #FEE180 0%, #E5A93B 100%);
      border: none;
      padding: 15px;
      border-radius: 100px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(229, 169, 59, 0.35);
      transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
    }

    .gold-sign-in-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(229, 169, 59, 0.5);
      filter: brightness(1.06);
    }

    .gold-sign-in-btn:active {
      transform: translateY(0);
    }

    /* Responsive adjustments */
    @media (max-width: 720px) {
      .lamp-login-stage {
        flex-direction: column;
        gap: 30px;
      }
      .lamp-fixture-wrap {
        height: 200px;
      }
      .lamp-svg {
        height: 200px;
      }
    }
  </style>
</head>
<body>

  <!-- Fullscreen Standalone Container -->
  <div class="admin-standalone-wrapper" id="adminWrapper">
    
    <!-- Warm Radial Lamp Light Beam Overlay -->
    <div class="lamp-glow-overlay"></div>

    <div class="lamp-login-stage">
      
      <!-- LEFT MINIMALIST TABLE LAMP -->
      <div class="lamp-fixture-wrap">
        <svg class="lamp-svg" viewBox="0 0 200 260" fill="none" xmlns="http://www.w3.org/2000/svg">
          
          <!-- Dome Lamp Shade (White Glowing Cap) -->
          <path class="lamp-shade-glow" d="M 25 85 C 25 32, 175 32, 175 85 Z" />
          <path d="M 25 85 L 175 85" stroke="#E2E8F0" stroke-width="3" stroke-linecap="round" />
          
          <!-- Post / Column -->
          <rect x="96" y="85" width="8" height="115" fill="#E2E8F0" rx="4" />
          
          <!-- Base Stand -->
          <rect x="55" y="196" width="90" height="10" fill="#E2E8F0" rx="5" />

          <!-- Interactive Pull Chain & Knob -->
          <g class="pull-chain-group" id="pullChainGroup" title="Click hook to turn on/off light & toggle color mode">
            <!-- Hanging Chain line -->
            <line id="chainLine" x1="130" y1="85" x2="130" y2="142" stroke="#E5A93B" stroke-width="2" stroke-dasharray="3 3" />
            <!-- Spherical Knob Hook -->
            <circle id="pullKnob" class="pull-knob" cx="130" cy="146" r="7" fill="#E5A93B" style="transition: transform 0.2s;" />
          </g>
        </svg>
      </div>

      <!-- RIGHT MINIMALIST GLASSMORPHISM LOGIN CARD -->
      <main class="glass-login-card">
        <h1 class="card-title">Welcome</h1>

        <form onsubmit="event.preventDefault(); alert('UNIMED Global Admin Portal Access Granted!');">
          <div class="form-group">
            
            <div class="field-block">
              <label for="username" class="field-label">Username</label>
              <input type="text" id="username" class="field-input" placeholder="Enter name" required autocomplete="username">
            </div>

            <div class="field-block">
              <label for="password" class="field-label">Password</label>
              <input type="password" id="password" class="field-input" placeholder="Enter Password" required autocomplete="current-password">
            </div>

          </div>

          <button type="submit" class="gold-sign-in-btn">Sign In</button>
        </form>
      </main>

    </div>
  </div>

  <script>
    const pullChainGroup = document.getElementById('pullChainGroup');
    const htmlEl = document.documentElement;

    function toggleLampTheme() {
      // Trigger cord pull bounce animation
      pullChainGroup.classList.remove('pulling');
      void pullChainGroup.offsetWidth; // trigger reflow
      pullChainGroup.classList.add('pulling');

      // Toggle site theme state
      const isLight = htmlEl.classList.contains('light-theme');
      if (isLight) {
        try { localStorage.setItem('theme', 'dark'); } catch (e) {}
        htmlEl.classList.remove('light-theme');
        window.dispatchEvent(new CustomEvent('themeChanged', { detail: { theme: 'dark' } }));
      } else {
        try { localStorage.setItem('theme', 'light'); } catch (e) {}
        htmlEl.classList.add('light-theme');
        window.dispatchEvent(new CustomEvent('themeChanged', { detail: { theme: 'light' } }));
      }
    }

    if (pullChainGroup) {
      pullChainGroup.addEventListener('click', toggleLampTheme);
    }
  </script>

</body>
</html>
